# ============================================
# Cấu hình cơ bản cho bàn phím 40 nút (non-split)
# ============================================

# --- Khử nhiễu phím (quan trọng) ---
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# --- Hỗ trợ BLE ---
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_BUF_ACL_RX_SIZE=512
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# --- Fix lỗi pin trên Windows ---
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# --- Quản lý năng lượng (tiết kiệm pin) ---
CONFIG_ZMK_IDLE_TIMEOUT=150000      # 2.5 phút không dùng thì sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000 # 15 phút thì deep sleep

# --- USB (để sạc và flash firmware) ---
CONFIG_ZMK_USB=y

# --- Tối ưu logging (giảm lag) ---
CONFIG_ZMK_USB_LOGGING=n

# --- ZMK Studio (bật, không cần khóa cứng) ---
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n

# --- Encoder (nếu có, giữ nguyên từ Config 2) ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- Màn hình OLED (nếu có, giữ nguyên từ Config 2) ---
CONFIG_ZMK_DISPLAY=y
# KHÔNG dùng CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED (chỉ cho split)

# ============================================
# KHÔNG thêm các dòng sau (chỉ dành cho split/pointing):
# - CONFIG_ZMK_POINTING
# - CONFIG_ZMK_EXT_POWER
# - CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED
# ============================================
